# =============================================================================
# Alembic configuration for Healthcare Policy & Claims Assistant
#
# `sqlalchemy.url` is left blank on purpose. `alembic/env.py` reads the
# real URL from the application's Settings object so dev / CI / prod can
# point at different databases just by changing env vars.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Use UTC timestamps in generated revision file names — easier to grep
# and to sort lexicographically.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# Could later run `ruff` / `black` on freshly generated revisions.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
