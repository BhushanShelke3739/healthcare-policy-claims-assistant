[pytest]
testpaths = tests
# -ra : short summary of all non-pass outcomes
# --strict-markers : fail if a marker isn't registered
# Coverage flags are off by default — opt in with `pytest --cov` or run the
# `make coverage` target. Running coverage on every iteration slows the
# inner dev loop and isn't worth it.
addopts = -ra --strict-markers
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests that require a live Postgres (auto-skip if unreachable)
